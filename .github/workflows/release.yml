name: Library Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Validate & Publish Library
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup Go
      - uses: actions/setup-go@v5
        with:
          go-version: 1.24.x
          cache: true

      # Verify dependencies
      - name: Verify go.mod tidy
        run: go mod tidy

      # Run tests
      - name: Run tests
        run: go test -race ./...

      # Verify build
      - name: Verify build
        run: go build ./...

      # Short fuzz tests
      - name: Run short fuzz tests
        run: go test -fuzz=Fuzz -fuzztime=5s ./... || echo "No fuzz tests defined"

      # Module download
      - name: Verify module download
        run: go mod download

      # Update Release Draft with Release Drafter
      - name: Update Release Draft
        uses: release-drafter/release-drafter@v6
        with:
          version: ${{ github.ref_name }}
